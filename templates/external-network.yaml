{{- if .Values.cbctf.k8s.externalNetwork.enabled }}
---
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: {{ .Release.Namespace }}-external-network
  labels:
    {{- include "cbctf.labels" . | nindent 4 }}
spec:
  protocol: IPv4
  cidrBlock: {{ .Values.cbctf.k8s.externalNetwork.cidr | quote }}
  gateway: {{ .Values.cbctf.k8s.externalNetwork.gateway | quote }}
  provider: {{ printf "%s-external-network.kube-system" .Release.Namespace | quote }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .Release.Namespace }}-external-network
  namespace: kube-system
  labels:
    {{- include "cbctf.labels" . | nindent 4 }}
spec:
  config: |
    {
      "cniVersion": "0.3.0",
      "type": "macvlan",
      "master": {{ .Values.cbctf.k8s.externalNetwork.interface | quote }},
      "mode": "bridge",
      "ipam": {
        "type": "kube-ovn",
        "server_socket": "/run/openvswitch/kube-ovn-daemon.sock",
        "provider": {{ printf "%s-external-network.kube-system" .Release.Namespace | quote }}
      }
    }
{{- end }}
