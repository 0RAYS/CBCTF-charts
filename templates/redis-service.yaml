{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cbctf.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "cbctf.redis.selectorLabels" . | nindent 4 }}
{{- end }}
