{{- if .Values.mysql.enabled }}
{{- $secretName := include "cbctf.mysql.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $rootPwd := .Values.mysql.auth.rootPassword }}
{{- if not $rootPwd }}
  {{- if and $existing $existing.data (index $existing.data "mysql-root-password") }}
    {{- $rootPwd = index $existing.data "mysql-root-password" | b64dec }}
  {{- else }}
    {{- $rootPwd = randAlphaNum 20 }}
  {{- end }}
{{- end }}
{{- $pwd := .Values.mysql.auth.password }}
{{- if not $pwd }}
  {{- if and $existing $existing.data (index $existing.data "mysql-password") }}
    {{- $pwd = index $existing.data "mysql-password" | b64dec }}
  {{- else }}
    {{- $pwd = randAlphaNum 20 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.mysql.labels" . | nindent 4 }}
type: Opaque
stringData:
  mysql-root-password: {{ $rootPwd | quote }}
  mysql-password: {{ $pwd | quote }}
{{- end }}
