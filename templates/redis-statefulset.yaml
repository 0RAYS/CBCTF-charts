{{- if .Values.redis.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cbctf.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "cbctf.redis.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "cbctf.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cbctf.redis.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000  # redis group
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              exec redis-server \
                --requirepass "$REDIS_PASSWORD" \
                --appendonly yes \
                --appendfsync everysec \
                --save 900 1 \
                --save 300 10 \
                --save 60 10000
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            {{- if .Values.timezone }}
            - name: TZ
              value: {{ .Values.timezone | quote }}
            {{- end }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cbctf.redis.fullname" . }}
                  key: redis-password
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -a $REDIS_PASSWORD ping | grep PONG"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -a $REDIS_PASSWORD ping | grep PONG"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data

  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "cbctf.redis.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.redis.persistence.accessMode | quote }}
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size | quote }}
  {{- end }}
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cbctf.redis.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "cbctf.redis.selectorLabels" . | nindent 4 }}
{{- end }}
