{{- $secretName := include "cbctf.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $jwtSecret := .Values.cbctf.gin.jwt.secret }}
{{- if not $jwtSecret }}
  {{- if and $existing $existing.data (index $existing.data "jwt-secret") }}
    {{- $jwtSecret = index $existing.data "jwt-secret" | b64dec }}
  {{- else }}
    {{- $jwtSecret = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ $jwtSecret | quote }}
