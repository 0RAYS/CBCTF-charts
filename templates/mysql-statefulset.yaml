{{- if .Values.mysql.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cbctf.mysql.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.mysql.labels" . | nindent 4 }}
data:
  custom.cnf: |
    {{- .Values.mysql.extraConfig | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cbctf.mysql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.mysql.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "cbctf.mysql.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "cbctf.mysql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cbctf.mysql.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 999  # mysql group
      containers:
        - name: mysql
          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            {{- if .Values.timezone }}
            - name: TZ
              value: {{ .Values.timezone | quote }}
            {{- end }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cbctf.mysql.fullname" . }}
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.auth.database | quote }}
            - name: MYSQL_USER
              value: {{ .Values.mysql.auth.username | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cbctf.mysql.fullname" . }}
                  key: mysql-password
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysql -u root -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1'"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.mysql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d/custom.cnf
              subPath: custom.cnf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "cbctf.mysql.fullname" . }}-config

  {{- if .Values.mysql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "cbctf.mysql.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.mysql.persistence.accessMode | quote }}
        {{- if .Values.mysql.persistence.storageClass }}
        storageClassName: {{ .Values.mysql.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mysql.persistence.size | quote }}
  {{- else }}
  # Persistence disabled — data will be lost on pod restart
  # Enable with: mysql.persistence.enabled=true
  {{- end }}
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cbctf.mysql.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.mysql.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.mysql.service.port }}
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "cbctf.mysql.selectorLabels" . | nindent 4 }}
{{- end }}
