{{- if .Values.redis.enabled }}
{{- $secretName := include "cbctf.redis.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $pwd := .Values.redis.auth.password }}
{{- if not $pwd }}
  {{- if and $existing $existing.data (index $existing.data "redis-password") }}
    {{- $pwd = index $existing.data "redis-password" | b64dec }}
  {{- else }}
    {{- $pwd = randAlphaNum 20 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.redis.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-password: {{ $pwd | quote }}
{{- end }}
